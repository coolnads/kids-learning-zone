<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#fbbf24"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<title>Map Quiz 🗺️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#051520;color:#fff;min-height:100vh}
  .wrap{max-width:800px;margin:0 auto;padding:20px 16px 60px}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .back{text-decoration:none;font-size:13px;font-weight:700;color:#34d399;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.25);padding:6px 14px;border-radius:99px}
  .back:hover{background:rgba(52,211,153,.22)}
  .page-title{font-size:22px;font-weight:900}
  .page-title span{color:#34d399}

  /* Region filter */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .f-btn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#94a3b8;transition:all .15s;font-family:'Nunito',sans-serif}
  .f-btn.active{background:#34d399;border-color:#34d399;color:#022c22}
  .f-btn:hover:not(.active){background:rgba(255,255,255,.1)}

  /* Score row */
  .score-bar{display:flex;gap:12px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
  .stat{text-align:center;background:rgba(255,255,255,.06);border-radius:14px;padding:8px 18px;min-width:70px}
  .stat .sv{font-size:22px;font-weight:900;color:#34d399}
  .stat .sl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}

  /* Challenge banner */
  .challenge{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:18px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .challenge-flag{font-size:44px;line-height:1;flex-shrink:0}
  .challenge-text{}
  .challenge-label{font-size:11px;font-weight:700;color:#34d399;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
  .challenge-q{font-size:20px;font-weight:900;color:#fff}
  .challenge-hint{font-size:13px;color:#94a3b8;margin-top:3px}

  /* Progress dots */
  .prog{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
  .prog-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s}
  .prog-dot.good{background:#34d399}
  .prog-dot.bad{background:#f87171}
  .prog-dot.cur{background:#fbbf24}

  /* Map container */
  .map-wrap{background:#0a2a3a;border:1px solid rgba(52,211,153,.15);border-radius:20px;overflow:hidden;margin-bottom:16px;position:relative;touch-action:manipulation}
  #world-map{width:100%;height:auto;display:block;cursor:crosshair}

  /* Country SVG paths */
  .country{fill:#1a4a5a;stroke:#0a2a3a;stroke-width:0.5;transition:fill .2s;cursor:pointer}
  .country:hover{fill:#2d7a6a}
  .country.target{fill:#fbbf24;stroke:#f59e0b;stroke-width:1.5;animation:pulse-target 1s ease-in-out infinite alternate}
  @keyframes pulse-target{from{fill:#fbbf24}to{fill:#f97316}}
  .country.correct-hit{fill:#34d399;stroke:#10b981;stroke-width:1.5}
  .country.wrong-hit{fill:#f87171;stroke:#ef4444;stroke-width:1.5}
  .country.revealed{fill:#34d399;stroke:#10b981;stroke-width:1;opacity:.7}

  /* Tooltip */
  .map-tip{position:absolute;background:rgba(0,0,0,.85);color:#fff;font-size:12px;font-weight:700;font-family:'Nunito',sans-serif;padding:5px 12px;border-radius:8px;pointer-events:none;display:none;z-index:10;white-space:nowrap}

  /* Feedback bar */
  .feedback{text-align:center;font-size:16px;font-weight:700;min-height:26px;margin-bottom:12px}
  .feedback.good{color:#34d399}
  .feedback.bad{color:#f87171}

  /* Fact reveal */
  .fact-reveal{background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.15);border-radius:14px;padding:12px 16px;font-size:14px;color:#a7f3d0;line-height:1.6;margin-bottom:14px;display:none}
  .fact-reveal.show{display:block}
  .fact-reveal strong{color:#34d399}

  .next-btn{display:none;margin:0 auto;padding:11px 36px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;background:#34d399;color:#022c22;border:none;border-radius:99px;cursor:pointer}
  .next-btn:hover{background:#10b981}

  /* End screen */
  .end-screen{display:none;text-align:center;padding:28px 0}
  .end-screen h2{font-size:26px;font-weight:900;margin-bottom:6px}
  .end-big{font-size:64px;font-weight:900;color:#34d399;line-height:1;margin:12px 0}
  .restart-btn{padding:12px 36px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;background:#34d399;color:#022c22;border:none;border-radius:99px;cursor:pointer;margin-top:16px}
</style>
</head>

};

let region='World', qList=[], qIdx=0, score=0, best=0, answered=false;
const TOTAL=10;

// Filter countries by region
function getPool(){
  const all=Object.entries(COUNTRIES_DATA);
  if(region==='World') return all;
  return all.filter(([,d])=>d.region===region);
}

function setRegion(r,el){
  region=r;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  startGame();
}

function startGame(){
  score=0; qIdx=0; answered=false;
  try{const b=localStorage.getItem('map_best');if(b)best=parseInt(b);}catch(e){}
  document.getElementById('s-best').textContent=best||'—';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('challenge').style.display='flex';
  // Reset all countries
  document.querySelectorAll('.country').forEach(p=>{
    p.classList.remove('target','correct-hit','wrong-hit','revealed');
    p.style.pointerEvents='auto';
  });
  let pool=getPool();
  if(pool.length<4) pool=Object.entries(COUNTRIES_DATA);
  qList=[...pool].sort(()=>Math.random()-.5).slice(0,TOTAL);
  buildDots(); loadQ();

  if(typeof KLZ!=='undefined'){ KLZ.markPlayed('map'); KLZ.checkTime(); KLZ.incStat('games_played'); }
}

function buildDots(){
  const p=document.getElementById('prog'); p.innerHTML='';
  for(let i=0;i<qList.length;i++){const d=document.createElement('div');d.className='prog-dot';d.id='dot-'+i;p.appendChild(d);}
}

function loadQ(){
  answered=false;
  const [id,data]=qList[qIdx];
  document.getElementById('c-flag').textContent=data.flag;
  document.getElementById('c-name').textContent=data.name;
  document.getElementById('c-hint').textContent=data.hint;
  document.getElementById('s-round').textContent=(qIdx+1)+'/'+qList.length;
  document.getElementById('s-score').textContent=score;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('fact-reveal').classList.remove('show');
  document.getElementById('next-btn').style.display='none';
  document.getElementById('dot-'+qIdx).className='prog-dot cur';

  // Reset countries
  document.querySelectorAll('.country').forEach(p=>{
    if(!p.classList.contains('revealed')){
      p.classList.remove('target','correct-hit','wrong-hit');
      p.style.pointerEvents='auto';
    }
  });
  // Highlight target
  const target=document.getElementById(id);
  if(target) target.classList.add('target');
}

// Tooltip
const tip=document.getElementById('map-tip');
document.querySelectorAll('.country').forEach(el=>{
  el.addEventListener('mousemove',e=>{
    const name=el.getAttribute('data-name');
    tip.textContent=name;
    const rect=document.getElementById('map-wrap').getBoundingClientRect();
    tip.style.left=(e.clientX-rect.left+10)+'px';
    tip.style.top=(e.clientY-rect.top-28)+'px';
    tip.style.display='block';
  });
  el.addEventListener('mouseleave',()=>{ tip.style.display='none'; });
  el.addEventListener('click',()=>{ tip.style.display='none'; handleClick(el); });
});

function handleClick(el){
  if(answered) return;
  const [targetId, targetData]=qList[qIdx];
  const clickedId=el.id;
  const ok=clickedId===targetId;
  answered=true;

  document.querySelectorAll('.country').forEach(p=>{ p.style.pointerEvents='none'; });

  el.classList.remove('target');
  el.classList.add(ok?'correct-hit':'wrong-hit');

  if(!ok){
    const t=document.getElementById(targetId);
    if(t){ t.classList.remove('target'); t.classList.add('revealed'); }
  }

  const fb=document.getElementById('feedback');
  if(ok){
    score++;
    const msgs=['Correct! 🎉','Spot on! 🌍','Brilliant! 🗺️','You found it! ⭐','Amazing! 🌟'];
    fb.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    fb.className='feedback good';
    document.getElementById('dot-'+qIdx).className='prog-dot good';
  } else {
    const clickedData=COUNTRIES_DATA[clickedId];
    fb.textContent=`That's ${clickedData?clickedData.name:'not it'}! The highlighted country is ${targetData.name} 🗺️`;
    fb.className='feedback bad';
    document.getElementById('dot-'+qIdx).className='prog-dot bad';
  }
  document.getElementById('s-score').textContent=score;

  const fr=document.getElementById('fact-reveal');
  fr.innerHTML=`<strong>📍 ${targetData.name}:</strong> ${targetData.fact}`;
  fr.classList.add('show');
  document.getElementById('next-btn').style.display='block';

  if(typeof KLZ!=='undefined'){
    if(ok) KLZ.incStat('correct_total');
    if(score===TOTAL) { KLZ.award('first_perfect'); KLZ.award('map_ace'); }
    if(score>=8) KLZ.award('map_ace');
  }
}

function nextQ(){
  qIdx++;
  if(qIdx>=qList.length){ showEnd(); return; }
  loadQ();
}

function showEnd(){
  document.getElementById('challenge').style.display='none';
  document.getElementById('feedback').textContent='';
  document.getElementById('fact-reveal').classList.remove('show');
  document.getElementById('next-btn').style.display='none';
  if(score>best){best=score;try{localStorage.setItem('map_best',best);}catch(e){}}
  document.getElementById('s-best').textContent=best;
  const pct=score/qList.length;
  document.getElementById('end-title').textContent=pct>=0.9?'Map master! 🗺️':pct>=0.6?'Great explorer! 🌍':'Keep exploring! 🧭';
  document.getElementById('end-score').textContent=score;
  document.getElementById('end-msg').textContent=`out of ${qList.length}`;
  document.getElementById('end-stars').textContent=pct>=0.9?'⭐⭐⭐':pct>=0.6?'⭐⭐':'⭐';
  document.getElementById('end-screen').style.display='block';
}

startGame();
</script>
