<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solar System 🪐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#060b1a;color:#fff;min-height:100vh;overflow-x:hidden}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
  @keyframes tw{0%,100%{opacity:.1}50%{opacity:.85}}
  .wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:20px 16px 60px}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:28px}
  .back{text-decoration:none;font-size:13px;font-weight:700;color:#818cf8;background:rgba(129,140,248,.12);border:1px solid rgba(129,140,248,.25);padding:6px 14px;border-radius:99px;transition:background .15s}
  .back:hover{background:rgba(129,140,248,.22)}
  .page-title{font-size:22px;font-weight:900;color:#fff}
  .page-title span{color:#818cf8}

  /* Tab bar */
  .tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
  .tab{padding:8px 20px;border-radius:99px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:background .15s,color .15s}
  .tab.active{background:#818cf8;color:#fff}
  .tab:not(.active){background:rgba(255,255,255,.07);color:#94a3b8}
  .tab:hover:not(.active){background:rgba(255,255,255,.12)}

  /* Explore view */
  #view-explore{display:block}
  #view-quiz{display:none}

  .solar-scroll{overflow-x:auto;padding:20px 0 12px;margin-bottom:24px}
  .solar-row{display:flex;align-items:flex-end;gap:20px;padding:0 12px;min-width:max-content}
  .sun{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff9c4,#fbbf24 40%,#f97316 75%,#ea580c);flex-shrink:0;cursor:pointer;box-shadow:0 0 40px #fbbf2460;animation:pulse 3s ease-in-out infinite;align-self:center}
  @keyframes pulse{0%,100%{box-shadow:0 0 40px #fbbf2460}50%{box-shadow:0 0 70px #fbbf2490}}

  .planet-col{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
  .planet-ball{border-radius:50%;transition:transform .2s,box-shadow .2s;flex-shrink:0}
  .planet-col:hover .planet-ball{transform:scale(1.15)}
  .planet-col.active .planet-ball{box-shadow:0 0 0 3px #fbbf24,0 0 20px #fbbf2460}
  .planet-name{font-size:11px;font-weight:700;color:#94a3b8;text-align:center}

  /* Info card */
  .info-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px;margin-bottom:24px;display:none;animation:fadein .3s ease}
  .info-card.show{display:block}
  @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .info-top{display:flex;align-items:flex-start;gap:20px;margin-bottom:16px;flex-wrap:wrap}
  .info-emoji{font-size:56px;line-height:1}
  .info-header h2{font-size:24px;font-weight:900;color:#fff;margin-bottom:4px}
  .info-header .tagline{font-size:13px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
  .facts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
  .fact-chip{background:rgba(255,255,255,.07);border-radius:12px;padding:10px 14px}
  .fact-chip .fc-label{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .fact-chip .fc-val{font-size:15px;font-weight:900;color:#fff;margin-top:2px}
  .fun-fact{background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.2);border-radius:12px;padding:12px 16px;font-size:14px;color:#c7d2fe;line-height:1.6}
  .fun-fact strong{color:#a5b4fc}

  /* Quiz view */
  .quiz-header{text-align:center;margin-bottom:24px}
  .quiz-header h2{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px}
  .quiz-header p{font-size:14px;color:#94a3b8}
  .q-score-row{display:flex;justify-content:center;gap:20px;margin:16px 0 24px;flex-wrap:wrap}
  .q-stat{text-align:center}
  .q-stat .qs-val{font-size:28px;font-weight:900;color:#fbbf24}
  .q-stat .qs-lbl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
  .q-question{font-size:18px;font-weight:700;color:#e2e8f0;text-align:center;margin-bottom:20px;min-height:52px;line-height:1.5}
  .q-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .q-opt{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 12px;font-size:15px;font-weight:700;color:#e2e8f0;cursor:pointer;transition:background .15s,border-color .15s;text-align:center}
  .q-opt:hover:not(:disabled){background:rgba(129,140,248,.18);border-color:#818cf8}
  .q-opt.correct{background:rgba(52,211,153,.15);border-color:#34d399;color:#6ee7b7}
  .q-opt.wrong{background:rgba(248,113,113,.12);border-color:#f87171;color:#fca5a5}
  .q-opt:disabled{cursor:default}
  .q-feedback{text-align:center;font-size:16px;font-weight:700;min-height:28px;margin-bottom:12px}
  .q-feedback.good{color:#34d399}
  .q-feedback.bad{color:#f87171}
  .q-next{display:none;margin:0 auto;padding:12px 36px;font-size:15px;font-weight:700;background:#818cf8;color:#fff;border:none;border-radius:99px;cursor:pointer;transition:background .15s}
  .q-next:hover{background:#6d5fd4}
  .q-progress{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .q-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s}
  .q-dot.done-good{background:#34d399}
  .q-dot.done-bad{background:#f87171}
  .q-dot.current{background:#fbbf24}

  .end-screen{display:none;text-align:center;padding:32px 0}
  .end-screen h2{font-size:30px;font-weight:900;color:#fff;margin-bottom:8px}
  .end-big{font-size:72px;font-weight:900;color:#fbbf24;line-height:1;margin:16px 0}
  .end-screen p{font-size:16px;color:#94a3b8;margin-bottom:24px}
  .restart-btn{padding:12px 36px;font-size:15px;font-weight:700;background:#818cf8;color:#fff;border:none;border-radius:99px;cursor:pointer}
  .restart-btn:hover{background:#6d5fd4}

  @media(max-width:480px){.q-options{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">

  <div class="topbar">
    <a class="back" href="index.html">← Home</a>
    <div class="page-title">🪐 <span>Solar System</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showView('explore',this)">🔭 Explore</button>
    <button class="tab" onclick="showView('quiz',this)">🧠 Quiz</button>
  </div>

  <!-- EXPLORE VIEW -->
  <div id="view-explore">
    <p style="font-size:14px;color:#64748b;margin-bottom:16px">Tap any planet to learn about it</p>
    <div class="solar-scroll">
      <div class="solar-row" id="solar-row">
        <div class="sun" onclick="showInfo(-1)" title="The Sun"></div>
      </div>
    </div>
    <div class="info-card" id="info-card"></div>
  </div>

  <!-- QUIZ VIEW -->
  <div id="view-quiz">
    <div class="quiz-header">
      <h2>Planet Quiz 🧠</h2>
      <p>10 questions about our solar system</p>
    </div>
    <div class="q-score-row">
      <div class="q-stat"><div class="qs-val" id="q-score">0</div><div class="qs-lbl">Score</div></div>
      <div class="q-stat"><div class="qs-val" id="q-round">1/10</div><div class="qs-lbl">Round</div></div>
      <div class="q-stat"><div class="qs-val" id="q-best">—</div><div class="qs-lbl">Best</div></div>
    </div>
    <div class="q-progress" id="q-progress"></div>
    <div class="q-question" id="q-question">Loading question...</div>
    <div class="q-options" id="q-options"></div>
    <div class="q-feedback" id="q-feedback"></div>
    <button class="q-next" id="q-next" onclick="nextQ()">Next ➡</button>
    <div class="end-screen" id="end-screen">
      <div style="font-size:56px">🏆</div>
      <h2 id="end-title">Amazing!</h2>
      <div class="end-big" id="end-score">10</div>
      <p id="end-msg">out of 10</p>
      <button class="restart-btn" onclick="startQuiz()">Play again ↺</button>
    </div>
  </div>

</div>

<script>
const PLANETS=[
  {name:'Mercury',emoji:'⚫',color:'#9ca3af',size:18,fact:'Closest planet to the Sun',distance:'57.9M km',moons:0,dayLen:'59 Earth days',funFact:'A year on Mercury is only 88 Earth days — but a day lasts 59 Earth days!'},
  {name:'Venus',emoji:'🌕',color:'#fcd34d',size:26,fact:'Hottest planet',distance:'108M km',moons:0,dayLen:'243 Earth days',funFact:'Venus spins backwards! The Sun rises in the west and sets in the east there.'},
  {name:'Earth',emoji:'🌍',color:'#3b82f6',size:28,fact:'Our home!',distance:'150M km',moons:1,dayLen:'24 hours',funFact:'Earth is the only known planet with liquid water on its surface — and life!'},
  {name:'Mars',emoji:'🔴',color:'#ef4444',size:22,fact:'The Red Planet',distance:'228M km',moons:2,dayLen:'24.6 hours',funFact:'Mars has the tallest volcano in the solar system — Olympus Mons is 3× taller than Everest!'},
  {name:'Jupiter',emoji:'🟠',color:'#f97316',size:52,fact:'Largest planet',distance:'778M km',moons:95,dayLen:'10 hours',funFact:'Jupiter\'s Great Red Spot is a storm that has been raging for over 350 years!'},
  {name:'Saturn',emoji:'🪐',color:'#fbbf24',size:46,fact:'Has beautiful rings',distance:'1.4B km',moons:146,dayLen:'10.7 hours',funFact:'Saturn\'s rings are made of ice and rock — and they\'re as thin as a 10-storey building!'},
  {name:'Uranus',emoji:'🩵',color:'#7dd3fc',size:36,fact:'Spins on its side',distance:'2.9B km',moons:28,dayLen:'17 hours',funFact:'Uranus is tilted so far it rotates on its side — like a rolling ball!'},
  {name:'Neptune',emoji:'🔵',color:'#3b82f6',size:34,fact:'Windiest planet',distance:'4.5B km',moons:16,dayLen:'16 hours',funFact:'Winds on Neptune reach 2,100 km/h — that\'s the fastest in the solar system!'},
];

const SUN={name:'The Sun',emoji:'☀️',color:'#fbbf24',fact:'Our star',distance:'0 km (centre)',moons:'—',dayLen:'25 Earth days',funFact:'The Sun contains 99.8% of all the mass in our solar system. It\'s so big that 1.3 million Earths could fit inside it!'};

// Build solar row
const row=document.getElementById('solar-row');
PLANETS.forEach((p,i)=>{
  const col=document.createElement('div');
  col.className='planet-col';
  col.id='pcol-'+i;
  col.onclick=()=>showInfo(i);
  const ball=document.createElement('div');
  ball.className='planet-ball';
  ball.style.cssText=`width:${p.size*1.5}px;height:${p.size*1.5}px;background:${p.color};`;
  const lbl=document.createElement('div');
  lbl.className='planet-name';
  lbl.textContent=p.name;
  col.appendChild(ball);col.appendChild(lbl);
  row.appendChild(col);
});

function showInfo(idx){
  document.querySelectorAll('.planet-col').forEach(c=>c.classList.remove('active'));
  const p=idx===-1?SUN:PLANETS[idx];
  if(idx>=0) document.getElementById('pcol-'+idx).classList.add('active');
  const card=document.getElementById('info-card');
  card.innerHTML=`
    <div class="info-top">
      <div class="info-emoji">${p.emoji}</div>
      <div class="info-header"><h2>${p.name}</h2><div class="tagline">${p.fact}</div></div>
    </div>
    <div class="facts-grid">
      <div class="fact-chip"><div class="fc-label">Distance from Sun</div><div class="fc-val">${p.distance}</div></div>
      <div class="fact-chip"><div class="fc-label">Moons</div><div class="fc-val">${p.moons}</div></div>
      <div class="fact-chip"><div class="fc-label">Day length</div><div class="fc-val">${p.dayLen}</div></div>
    </div>
    <div class="fun-fact"><strong>Fun fact:</strong> ${p.funFact}</div>`;
  card.classList.add('show');
}

// Show first planet by default
showInfo(2);

function showView(id,btn){
  document.getElementById('view-explore').style.display=id==='explore'?'block':'none';
  document.getElementById('view-quiz').style.display=id==='quiz'?'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(id==='quiz') startQuiz();
}

// QUIZ
const QUESTIONS=[
  {q:'Which is the largest planet in our solar system?',a:'Jupiter',opts:['Jupiter','Saturn','Neptune','Uranus']},
  {q:'How many planets are in our solar system?',a:'8',opts:['7','8','9','10']},
  {q:'Which planet is known as the Red Planet?',a:'Mars',opts:['Mars','Venus','Mercury','Jupiter']},
  {q:'Which planet has the most moons?',a:'Saturn',opts:['Jupiter','Saturn','Uranus','Neptune']},
  {q:'What is the closest planet to the Sun?',a:'Mercury',opts:['Mercury','Venus','Earth','Mars']},
  {q:'Which planet has beautiful rings around it?',a:'Saturn',opts:['Jupiter','Uranus','Saturn','Neptune']},
  {q:'Which is the hottest planet?',a:'Venus',opts:['Mercury','Venus','Mars','Jupiter']},
  {q:'Which planet do we live on?',a:'Earth',opts:['Mars','Venus','Earth','Jupiter']},
  {q:'Which planet is the farthest from the Sun?',a:'Neptune',opts:['Uranus','Neptune','Saturn','Pluto']},
  {q:'What is at the centre of our solar system?',a:'The Sun',opts:['The Moon','The Sun','Earth','A black hole']},
  {q:'Which planet spins on its side?',a:'Uranus',opts:['Neptune','Saturn','Uranus','Mercury']},
  {q:'Which planet has the Great Red Spot?',a:'Jupiter',opts:['Mars','Jupiter','Saturn','Venus']},
  {q:'How long does Earth take to go around the Sun?',a:'365 days',opts:['365 days','24 hours','100 days','7 days']},
  {q:'Which planet has the fastest winds?',a:'Neptune',opts:['Jupiter','Saturn','Uranus','Neptune']},
];

let qList=[],qIdx=0,qScore=0,qBest=0,qAnswered=false;

function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

function startQuiz(){
  qList=shuffle(QUESTIONS).slice(0,10);
  qIdx=0;qScore=0;qAnswered=false;
  try{const b=localStorage.getItem('space_best');if(b)qBest=parseInt(b);}catch(e){}
  document.getElementById('q-best').textContent=qBest||'—';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('q-question').style.display='block';
  document.getElementById('q-options').style.display='grid';
  document.getElementById('q-feedback').textContent='';
  buildDots();loadQ();
}

function buildDots(){
  const p=document.getElementById('q-progress');
  p.innerHTML='';
  for(let i=0;i<10;i++){const d=document.createElement('div');d.className='q-dot';d.id='dot-'+i;p.appendChild(d);}
}

function loadQ(){
  qAnswered=false;
  const q=qList[qIdx];
  document.getElementById('q-question').textContent=q.q;
  document.getElementById('q-round').textContent=(qIdx+1)+'/10';
  document.getElementById('q-score').textContent=qScore;
  document.getElementById('q-feedback').textContent='';
  document.getElementById('q-feedback').className='q-feedback';
  document.getElementById('q-next').style.display='none';
  document.getElementById('dot-'+qIdx).className='q-dot current';
  const opts=document.getElementById('q-options');
  opts.innerHTML='';
  shuffle(q.opts).forEach(o=>{
    const b=document.createElement('button');
    b.className='q-opt';b.textContent=o;
    b.onclick=()=>answerQ(o,b,q.a);
    opts.appendChild(b);
  });
}

function answerQ(chosen,btn,correct){
  if(qAnswered)return;
  qAnswered=true;
  const ok=chosen===correct;
  btn.classList.add(ok?'correct':'wrong');
  document.querySelectorAll('.q-opt').forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add('correct');});
  const fb=document.getElementById('q-feedback');
  if(ok){
    qScore++;
    const msgs=['Brilliant! 🌟','Correct! 🎉','You\'re a space genius! 🚀','Perfect! ⭐','Amazing! 🪐'];
    fb.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    fb.className='q-feedback good';
    document.getElementById('dot-'+qIdx).className='q-dot done-good';
  } else {
    fb.textContent=`The answer was ${correct} 🌍`;
    fb.className='q-feedback bad';
    document.getElementById('dot-'+qIdx).className='q-dot done-bad';
  }
  document.getElementById('q-score').textContent=qScore;
  document.getElementById('q-next').style.display='block';
}

function nextQ(){
  qIdx++;
  if(qIdx>=10){showEnd();return;}
  loadQ();
}

function showEnd(){
  document.getElementById('q-question').style.display='none';
  document.getElementById('q-options').style.display='none';
  document.getElementById('q-next').style.display='none';
  document.getElementById('q-feedback').textContent='';
  const end=document.getElementById('end-screen');
  end.style.display='block';
  if(qScore>qBest){qBest=qScore;try{localStorage.setItem('space_best',qBest);}catch(e){}}
  document.getElementById('q-best').textContent=qBest;
  document.getElementById('end-score').textContent=qScore;
  const pct=qScore/10;
  document.getElementById('end-title').textContent=pct>=0.9?'Space genius! 🚀':pct>=0.6?'Great explorer! 🔭':'Keep stargazing! 🌟';
  document.getElementById('end-msg').textContent=`You scored ${qScore} out of 10`;
}

// Stars
const sEl=document.getElementById('stars');
for(let i=0;i<100;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--dl:${(Math.random()*4).toFixed(1)}s`;
  sEl.appendChild(s);
}

startQuiz();
</script>
</body>
</html>
