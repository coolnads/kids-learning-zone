<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>History — Who Am I? 🏛️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#1a0a2e;color:#fff;min-height:100vh}
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:24px}
  .back{text-decoration:none;font-size:13px;font-weight:700;color:#c084fc;background:rgba(192,132,252,.12);border:1px solid rgba(192,132,252,.25);padding:6px 14px;border-radius:99px;transition:background .15s}
  .back:hover{background:rgba(192,132,252,.22)}
  .page-title{font-size:22px;font-weight:900}
  .page-title span{color:#c084fc}

  /* Era filter */
  .era-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .era-btn{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:#94a3b8;transition:all .15s}
  .era-btn.active{background:#c084fc;border-color:#c084fc;color:#1a0a2e}
  .era-btn:hover:not(.active){background:rgba(255,255,255,.1)}

  /* Score bar */
  .score-bar{display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .stat{text-align:center;background:rgba(255,255,255,.06);border-radius:14px;padding:10px 18px;min-width:72px}
  .stat .sv{font-size:24px;font-weight:900;color:#c084fc}
  .stat .sl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}

  /* Progress dots */
  .prog{display:flex;gap:5px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
  .prog-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s}
  .prog-dot.good{background:#a78bfa}
  .prog-dot.bad{background:#f87171}
  .prog-dot.cur{background:#fbbf24}

  /* Mystery card */
  .mystery-card{background:rgba(255,255,255,.05);border:1px solid rgba(192,132,252,.2);border-radius:24px;padding:28px 24px;margin-bottom:20px;position:relative;overflow:hidden}
  .mystery-card::before{content:'?';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:120px;font-weight:900;color:rgba(192,132,252,.08);line-height:1;pointer-events:none}

  .era-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 12px;border-radius:99px;background:rgba(192,132,252,.15);color:#c084fc;margin-bottom:16px;letter-spacing:.06em;text-transform:uppercase}

  .clues-title{font-size:13px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

  .clue{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:12px;margin-bottom:8px;animation:cluein .4s ease;transition:background .3s}
  @keyframes cluein{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
  .clue.revealed{background:rgba(255,255,255,.06)}
  .clue.hidden{background:rgba(255,255,255,.03);opacity:.35}
  .clue-num{font-size:13px;font-weight:900;color:#c084fc;min-width:22px}
  .clue-text{font-size:15px;color:#e2e8f0;line-height:1.5}
  .clue.hidden .clue-text{filter:blur(5px);user-select:none}

  .reveal-btn{width:100%;margin-top:14px;padding:10px;background:rgba(192,132,252,.12);border:1px dashed rgba(192,132,252,.3);border-radius:12px;font-size:14px;font-weight:700;color:#c084fc;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .15s}
  .reveal-btn:hover{background:rgba(192,132,252,.2)}

  /* Points indicator */
  .pts-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
  .pts-chip{font-size:12px;font-weight:700;padding:4px 14px;border-radius:99px;transition:all .3s}
  .pts-chip.active{background:#fbbf24;color:#1a0a2e}
  .pts-chip.used{background:rgba(255,255,255,.06);color:#475569;text-decoration:line-through}
  .pts-chip.available{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}

  /* Options */
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .opt{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 10px;font-size:14px;font-weight:700;color:#e2e8f0;cursor:pointer;transition:all .15s;text-align:center;font-family:'Nunito',sans-serif;line-height:1.3}
  .opt:hover:not(:disabled){background:rgba(192,132,252,.18);border-color:#c084fc}
  .opt.correct{background:rgba(167,139,250,.2);border-color:#a78bfa;color:#c4b5fd}
  .opt.wrong{background:rgba(248,113,113,.12);border-color:#f87171;color:#fca5a5}
  .opt:disabled{cursor:default}

  .feedback{text-align:center;font-size:16px;font-weight:700;min-height:26px;margin-bottom:10px}
  .feedback.good{color:#a78bfa}
  .feedback.bad{color:#f87171}

  /* Reveal panel (shown after answer) */
  .reveal-panel{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:16px;padding:18px;margin-bottom:14px;display:none;animation:fadein .35s ease}
  .reveal-panel.show{display:block}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .reveal-panel .figure-emoji{font-size:52px;margin-bottom:8px;display:block}
  .reveal-panel h3{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px}
  .reveal-panel .years{font-size:13px;color:#94a3b8;margin-bottom:10px}
  .reveal-panel p{font-size:14px;color:#c4b5fd;line-height:1.6}

  .next-btn{display:none;margin:0 auto;padding:12px 36px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;background:#c084fc;color:#1a0a2e;border:none;border-radius:99px;cursor:pointer;transition:background .15s}
  .next-btn:hover{background:#a855f7}

  /* End screen */
  .end-screen{display:none;text-align:center;padding:32px 0}
  .end-screen h2{font-size:28px;font-weight:900;margin-bottom:6px}
  .end-big{font-size:68px;font-weight:900;color:#c084fc;line-height:1;margin:14px 0}
  .end-screen p{font-size:15px;color:#94a3b8;margin-bottom:20px}
  .restart-btn{padding:12px 36px;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;background:#c084fc;color:#1a0a2e;border:none;border-radius:99px;cursor:pointer}
  .restart-btn:hover{background:#a855f7}

  @media(max-width:440px){.options{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="back" href="index.html">← Home</a>
    <div class="page-title">🏛️ <span>Who Am I?</span></div>
  </div>

  <div class="era-row">
    <button class="era-btn active" onclick="setEra('All',this)">🌍 All Eras</button>
    <button class="era-btn" onclick="setEra('Ancient',this)">🏺 Ancient</button>
    <button class="era-btn" onclick="setEra('Explorers',this)">⚓ Explorers</button>
    <button class="era-btn" onclick="setEra('Science',this)">🔬 Scientists</button>
    <button class="era-btn" onclick="setEra('Leaders',this)">👑 Leaders</button>
    <button class="era-btn" onclick="setEra('Modern',this)">🚀 Modern</button>
  </div>

  <div class="score-bar">
    <div class="stat"><div class="sv" id="s-score">0</div><div class="sl">Score</div></div>
    <div class="stat"><div class="sv" id="s-round">1/8</div><div class="sl">Round</div></div>
    <div class="stat"><div class="sv" id="s-best">—</div><div class="sl">Best</div></div>
  </div>

  <div class="prog" id="prog"></div>

  <!-- Mystery card -->
  <div class="mystery-card" id="mystery-card">
    <div class="era-badge" id="era-badge">Ancient</div>
    <div class="clues-title">Clues — guess with fewer clues for more points!</div>
    <div id="clues-list"></div>
    <button class="reveal-btn" id="reveal-btn" onclick="revealNextClue()">👁 Reveal next clue</button>
  </div>

  <!-- Points available -->
  <div class="pts-row" id="pts-row"></div>

  <!-- Options -->
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>

  <!-- Reveal panel -->
  <div class="reveal-panel" id="reveal-panel">
    <span class="figure-emoji" id="rp-emoji">👑</span>
    <h3 id="rp-name">Cleopatra</h3>
    <div class="years" id="rp-years">69 BC – 30 BC</div>
    <p id="rp-fact"></p>
  </div>

  <button class="next-btn" id="next-btn" onclick="nextQ()">Next person ➡</button>

  <!-- End screen -->
  <div class="end-screen" id="end-screen">
    <div style="font-size:56px">🏛️</div>
    <h2 id="end-title">History buff!</h2>
    <div class="end-big" id="end-score">0</div>
    <p id="end-msg">points earned</p>
    <div id="end-stars" style="font-size:36px;margin:12px 0 20px"></div>
    <button class="restart-btn" onclick="startGame()">Play again ↺</button>
  </div>
</div>

<script>
const FIGURES = [
  {name:'Cleopatra',emoji:'👑',era:'Ancient',years:'69 BC – 30 BC',
   clues:['I was the last ruler of ancient Egypt','I could speak nine languages','Julius Caesar and Mark Antony were both in love with me','I ruled from the city of Alexandria'],
   options:['Cleopatra','Nefertiti','Queen Hatshepsut','Boudicca'],
   fact:'Cleopatra was incredibly clever — she was the first ruler in her dynasty to learn the Egyptian language. She was also a skilled politician who ruled Egypt for 21 years.'},
  {name:'Julius Caesar',emoji:'⚔️',era:'Ancient',years:'100 BC – 44 BC',
   clues:['I was a powerful ruler of ancient Rome','I conquered Gaul (modern France)','The month of July is named after me','I was assassinated on the Ides of March'],
   options:['Julius Caesar','Augustus','Nero','Hannibal'],
   fact:'Julius Caesar was one of history\'s greatest military generals. He wrote accounts of his own battles and even invented a secret code — the Caesar cipher — to send messages!'},
  {name:'Tutankhamun',emoji:'🪙',era:'Ancient',years:'1341 BC – 1323 BC',
   clues:['I became pharaoh of Egypt when I was only 9 years old','I died when I was around 18 or 19','My tomb was discovered in 1922 by Howard Carter','I am sometimes called the "Boy King"'],
   options:['Tutankhamun','Ramesses II','Akhenaten','Thutmose III'],
   fact:'Tutankhamun\'s tomb was one of the greatest archaeological finds ever. It contained over 5,000 objects including a solid gold death mask. His mummy is still in the Valley of the Kings today.'},
  {name:'Alexander the Great',emoji:'🏇',era:'Ancient',years:'356 BC – 323 BC',
   clues:['I was from Macedonia in ancient Greece','I never lost a single battle','I built an empire stretching from Greece to India','I founded many cities, including one named Alexandria in Egypt'],
   options:['Alexander the Great','Leonidas','Pericles','Achilles'],
   fact:'Alexander the Great conquered most of the known world by the time he was 30 years old. His beloved horse was called Bucephalus and he refused to ride any other horse for most of his life.'},
  {name:'Christopher Columbus',emoji:'⚓',era:'Explorers',years:'1451 – 1506',
   clues:['I was an Italian explorer who sailed for Spain','I crossed the Atlantic Ocean in 1492','I was searching for a route to Asia but found something else','I landed in the Bahamas and called the people there "Indians"'],
   options:['Christopher Columbus','Vasco da Gama','Ferdinand Magellan','John Cabot'],
   fact:'Columbus made four voyages across the Atlantic, but he never actually realised he had found a new continent. He believed until he died that he had reached Asia!'},
  {name:'Vasco da Gama',emoji:'🚢',era:'Explorers',years:'1460 – 1524',
   clues:['I was a Portuguese explorer','I was the first European to sail directly from Europe to India','My voyage opened up a sea trade route around Africa','I sailed around the Cape of Good Hope'],
   options:['Vasco da Gama','Bartholomeu Dias','Ferdinand Magellan','Christopher Columbus'],
   fact:'Vasco da Gama\'s voyage to India in 1498 was one of history\'s most important journeys. It opened up sea trade between Europe and Asia and made Portugal incredibly wealthy.'},
  {name:'Ferdinand Magellan',emoji:'🌐',era:'Explorers',years:'1480 – 1521',
   clues:['I was a Portuguese explorer who sailed for Spain','I led the first expedition to sail around the entire world','I died before the voyage was completed','The Strait of Magellan at the tip of South America is named after me'],
   options:['Ferdinand Magellan','Francis Drake','Amerigo Vespucci','James Cook'],
   fact:'Magellan\'s fleet set off with 5 ships and 270 men in 1519. Only 1 ship and 18 men made it back — but they had proved the Earth was round by sailing all the way around it!'},
  {name:'Isaac Newton',emoji:'🍎',era:'Science',years:'1643 – 1727',
   clues:['I was an English scientist and mathematician','A falling apple supposedly helped me understand gravity','I invented calculus','I showed that white light is made of all the colours of the rainbow'],
   options:['Isaac Newton','Galileo Galilei','Robert Hooke','Gottfried Leibniz'],
   fact:'Newton was so brilliant that many scientists consider him the greatest who ever lived. He also spent a huge amount of time studying alchemy and secretly trying to turn metal into gold!'},
  {name:'Galileo Galilei',emoji:'🔭',era:'Science',years:'1564 – 1642',
   clues:['I was an Italian astronomer and physicist','I improved the telescope and used it to study space','I discovered four moons of Jupiter','The Church put me under house arrest for saying Earth goes around the Sun'],
   options:['Galileo Galilei','Nicolaus Copernicus','Tycho Brahe','Johannes Kepler'],
   fact:'Galileo is called the "father of modern science." He was put under house arrest for the last 9 years of his life for daring to say the Earth moves around the Sun — which was completely true!'},
  {name:'Marie Curie',emoji:'⚗️',era:'Science',years:'1867 – 1934',
   clues:['I was a Polish-French scientist','I was the first woman to win a Nobel Prize','I won Nobel Prizes in two different sciences','I discovered the elements polonium and radium'],
   options:['Marie Curie','Ada Lovelace','Lise Meitner','Rosalind Franklin'],
   fact:'Marie Curie is the only person ever to win Nobel Prizes in two different sciences — Physics in 1903 and Chemistry in 1911. Her notebooks are still so radioactive they\'re kept in lead-lined boxes!'},
  {name:'Charles Darwin',emoji:'🦎',era:'Science',years:'1809 – 1882',
   clues:['I was an English naturalist','I sailed around the world on a ship called the Beagle','I spent years studying animals on the Galápagos Islands','I wrote "On the Origin of Species" about evolution'],
   options:['Charles Darwin','Alfred Russel Wallace','Jean-Baptiste Lamarck','Thomas Huxley'],
   fact:'Darwin collected thousands of specimens on his five-year voyage. His theory of evolution by natural selection is one of the most important ideas in all of science.'},
  {name:'Queen Victoria',emoji:'👸',era:'Leaders',years:'1819 – 1901',
   clues:['I became Queen of England at just 18 years old','I ruled for 63 years — one of the longest reigns ever','The era of my reign is named after me','I had nine children and 42 grandchildren'],
   options:['Queen Victoria','Queen Elizabeth I','Mary Queen of Scots','Queen Anne'],
   fact:'Queen Victoria\'s reign was so long and influential it is called the Victorian Era. She was grandmother to most of the royal families of Europe, earning the nickname "Grandmother of Europe."'},
  {name:'Napoleon Bonaparte',emoji:'🎖️',era:'Leaders',years:'1769 – 1821',
   clues:['I was born on the island of Corsica','I rose to become Emperor of France','I reformed the legal system with a famous code of laws','I was finally defeated at the Battle of Waterloo'],
   options:['Napoleon Bonaparte','Louis XIV','Cardinal Richelieu','Maximilien Robespierre'],
   fact:'Napoleon is famous for supposedly being very short — but historians now think he was actually around average height! The confusion came from a mix-up between French and English inches.'},
  {name:'Winston Churchill',emoji:'🎩',era:'Leaders',years:'1874 – 1965',
   clues:['I was the Prime Minister of Britain during World War II','I was famous for my inspiring speeches','I won the Nobel Prize in Literature','My "V for Victory" hand sign became world famous'],
   options:['Winston Churchill','Neville Chamberlain','Clement Attlee','Lloyd George'],
   fact:'Churchill was also a brilliant painter and wrote millions of words — books, speeches, and articles. He won the Nobel Prize for Literature in 1953, not for peace or science!'},
  {name:'Nelson Mandela',emoji:'✊',era:'Modern',years:'1918 – 2013',
   clues:['I was born in South Africa','I spent 27 years in prison for fighting against apartheid','I became the first Black president of South Africa in 1994','I won the Nobel Peace Prize in 1993'],
   options:['Nelson Mandela','Desmond Tutu','Oliver Tambo','Walter Sisulu'],
   fact:'Mandela was imprisoned for 27 years on Robben Island, but never gave up hope. After his release, instead of anger, he chose forgiveness — helping South Africa transition peacefully to democracy.'},
  {name:'Neil Armstrong',emoji:'🚀',era:'Modern',years:'1930 – 2012',
   clues:['I was an American astronaut and test pilot','I was part of the Apollo 11 mission','I was the first human to walk on the Moon','I said a very famous sentence when I arrived somewhere new'],
   options:['Neil Armstrong','Buzz Aldrin','Yuri Gagarin','Alan Shepard'],
   fact:'"That\'s one small step for man, one giant leap for mankind." Neil Armstrong spoke these words on 20 July 1969. He brought a piece of the Wright Brothers\' first airplane to the Moon with him!'},
  {name:'Amelia Earhart',emoji:'✈️',era:'Modern',years:'1897 – 1937',
   clues:['I was an American aviation pioneer','I was the first woman to fly solo across the Atlantic Ocean','I disappeared mysteriously over the Pacific Ocean in 1937','I set many speed and altitude records for aircraft'],
   options:['Amelia Earhart','Bessie Coleman','Harriet Quimby','Jacqueline Cochran'],
   fact:'Amelia Earhart was a trailblazer who inspired millions of women. She disappeared while attempting to fly around the world in 1937 and was never found — one of history\'s greatest mysteries.'},
  {name:'Albert Einstein',emoji:'🧠',era:'Modern',years:'1879 – 1955',
   clues:['I was a German-born theoretical physicist','I developed the theory of relativity','My most famous equation is E = mc²','I fled to the USA when the Nazis came to power in Germany'],
   options:['Albert Einstein','Max Planck','Niels Bohr','Werner Heisenberg'],
   fact:'Einstein didn\'t speak until he was three years old and struggled in school. Yet he came up with ideas that changed our understanding of space, time, and energy forever. He was offered the presidency of Israel but turned it down!'},
  {name:'Leonardo da Vinci',emoji:'🎨',era:'Explorers',years:'1452 – 1519',
   clues:['I was born in Italy during the Renaissance','I painted the Mona Lisa and The Last Supper','I designed flying machines hundreds of years before aeroplanes','I was a painter, sculptor, architect, engineer, and scientist'],
   options:['Leonardo da Vinci','Michelangelo','Raphael','Donatello'],
   fact:'Da Vinci wrote his notebooks in mirror writing — backwards! He may have done this to keep his ideas secret, or simply because he was left-handed and it was easier. He left over 13,000 pages of notes.'},
  {name:'William Shakespeare',emoji:'📜',era:'Explorers',years:'1564 – 1616',
   clues:['I was born in Stratford-upon-Avon in England','I wrote 37 plays and 154 sonnets','I part-owned a famous theatre in London','Romeo and Juliet, Hamlet, and Macbeth are among my most famous works'],
   options:['William Shakespeare','Christopher Marlowe','Ben Jonson','John Milton'],
   fact:'Shakespeare invented over 1,700 words we still use today — including "bedroom", "lonely", "generous", and "excitement." His Globe Theatre could hold up to 3,000 people!'},
];

let era='All',figures=[],qList=[],qIdx=0,score=0,best=0,answered=false,cluesShown=0;
const TOTAL=8;
const PTS_PER_CLUE=[4,3,2,1];

function setEra(e,el){
  era=e;
  document.querySelectorAll('.era-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  startGame();
}

function startGame(){
  score=0;qIdx=0;answered=false;
  try{const b=localStorage.getItem('history_best');if(b)best=parseInt(b);}catch(e){}
  document.getElementById('s-best').textContent=best||'—';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('mystery-card').style.display='block';
  document.getElementById('options').style.display='grid';

  figures=era==='All'?[...FIGURES]:[...FIGURES.filter(f=>f.era===era)];
  if(figures.length<4)figures=[...FIGURES];
  qList=[...figures].sort(()=>Math.random()-.5).slice(0,TOTAL);

  buildDots();loadQ();
}

function buildDots(){
  const p=document.getElementById('prog');p.innerHTML='';
  for(let i=0;i<Math.min(TOTAL,qList.length);i++){
    const d=document.createElement('div');d.className='prog-dot';d.id='dot-'+i;p.appendChild(d);
  }
}

function loadQ(){
  answered=false;cluesShown=1;
  const f=qList[qIdx];
  document.getElementById('era-badge').textContent=f.era+' · '+f.years;
  document.getElementById('s-round').textContent=(qIdx+1)+'/'+qList.length;
  document.getElementById('s-score').textContent=score;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('reveal-panel').classList.remove('show');
  document.getElementById('next-btn').style.display='none';
  document.getElementById('dot-'+qIdx).className='prog-dot cur';

  // Build clues (first revealed, rest blurred)
  const cl=document.getElementById('clues-list');
  cl.innerHTML='';
  f.clues.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='clue '+(i===0?'revealed':'hidden');
    div.id='clue-'+i;
    div.innerHTML=`<span class="clue-num">${i+1}</span><span class="clue-text">${c}</span>`;
    cl.appendChild(div);
  });

  // Reveal button
  const rb=document.getElementById('reveal-btn');
  rb.style.display='block';
  rb.textContent='👁 Reveal next clue (costs 1 point)';

  // Points chips
  buildPtsRow();

  // Options
  buildOptions(f);
}

function buildPtsRow(){
  const pr=document.getElementById('pts-row');
  pr.innerHTML='<span style="font-size:12px;color:#64748b;font-weight:700;align-self:center">Points if you guess now:</span>';
  PTS_PER_CLUE.forEach((p,i)=>{
    const chip=document.createElement('span');
    chip.className='pts-chip '+(i===cluesShown-1?'active':i<cluesShown-1?'used':'available');
    chip.id='pts-'+i;
    chip.textContent=p+' pts';
    pr.appendChild(chip);
  });
}

function buildOptions(f){
  const el=document.getElementById('options');
  el.innerHTML='';
  // Mix real options with decoys from other figures
  const pool=[...f.options].sort(()=>Math.random()-.5).slice(0,4);
  if(!pool.includes(f.name)){pool[3]=f.name;}
  pool.sort(()=>Math.random()-.5);
  pool.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt';
    b.textContent=o;
    b.onclick=()=>pick(o,b,f);
    el.appendChild(b);
  });
}

function revealNextClue(){
  if(cluesShown>=qList[qIdx].clues.length){return;}
  const next=document.getElementById('clue-'+cluesShown);
  if(next){next.className='clue revealed';}
  cluesShown++;
  // Update pts chips
  PTS_PER_CLUE.forEach((_,i)=>{
    const chip=document.getElementById('pts-'+i);
    if(!chip)return;
    chip.className='pts-chip '+(i===cluesShown-1?'active':i<cluesShown-1?'used':'available');
  });
  const rb=document.getElementById('reveal-btn');
  if(cluesShown>=qList[qIdx].clues.length){rb.style.display='none';}
  else{rb.textContent=`👁 Reveal clue ${cluesShown+1} of ${qList[qIdx].clues.length} (costs 1 point)`;}
}

function pick(val,btn,f){
  if(answered)return;
  answered=true;
  document.getElementById('reveal-btn').style.display='none';
  const ok=val===f.name;
  btn.classList.add(ok?'correct':'wrong');
  document.querySelectorAll('.opt').forEach(b=>{b.disabled=true;if(b.textContent===f.name)b.classList.add('correct');});

  // Reveal all clues
  f.clues.forEach((_,i)=>{
    const el=document.getElementById('clue-'+i);
    if(el)el.className='clue revealed';
  });

  const fb=document.getElementById('feedback');
  if(ok){
    const pts=PTS_PER_CLUE[Math.min(cluesShown-1,PTS_PER_CLUE.length-1)];
    score+=pts;
    fb.textContent=`Correct! +${pts} point${pts!==1?'s':''}! 🎉`;
    fb.className='feedback good';
    document.getElementById('dot-'+qIdx).className='prog-dot good';
  } else {
    fb.textContent=`Not quite — read on to find out who it was! 🧐`;
    fb.className='feedback bad';
    document.getElementById('dot-'+qIdx).className='prog-dot bad';
  }
  document.getElementById('s-score').textContent=score;

  // Show reveal panel
  const rp=document.getElementById('reveal-panel');
  document.getElementById('rp-emoji').textContent=f.emoji;
  document.getElementById('rp-name').textContent=f.name;
  document.getElementById('rp-years').textContent=f.years;
  document.getElementById('rp-fact').textContent=f.fact;
  rp.classList.add('show');

  document.getElementById('next-btn').style.display='block';
}

function nextQ(){
  qIdx++;
  if(qIdx>=qList.length){showEnd();return;}
  loadQ();
}

function showEnd(){
  document.getElementById('mystery-card').style.display='none';
  document.getElementById('options').style.display='none';
  document.getElementById('pts-row').innerHTML='';
  document.getElementById('feedback').textContent='';
  document.getElementById('reveal-panel').classList.remove('show');
  document.getElementById('next-btn').style.display='none';
  const maxPts=qList.length*4;
  if(score>best){best=score;try{localStorage.setItem('history_best',best);}catch(e){}}
  document.getElementById('s-best').textContent=best;
  const pct=score/maxPts;
  document.getElementById('end-title').textContent=pct>=0.8?'History genius! 🏛️':pct>=0.5?'Great historian! 📜':'Keep exploring history! 🗺️';
  document.getElementById('end-score').textContent=score;
  document.getElementById('end-msg').textContent=`out of ${maxPts} possible points`;
  document.getElementById('end-stars').textContent=pct>=0.8?'⭐⭐⭐':pct>=0.5?'⭐⭐':'⭐';
  document.getElementById('end-screen').style.display='block';
}

startGame();
</script>
